<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login | InternMatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../styles/auth.css">
</head>
<body>

<div class="auth-topbar">
  <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
    <div class="logo-icon"><i class="fas fa-rocket"></i></div>
    <span class="logo-text">InternMatch</span>
  </a>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Welcome Back 👋</h2>
    <p class="auth-subtitle">Sign in to your student account</p>

    <form id="loginForm" onsubmit="return handleStudentLogin(event)">
      <div class="form-group" id="emailGroup">
        <label>Email Address</label>
        <div class="input-field">
          <i class="fas fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="error-msg"><i class="fas fa-exclamation-circle"></i> <span>Please enter a valid email</span></div>
      </div>

      <div class="form-group" id="passwordGroup">
        <label>Password</label>
        <div class="input-field">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <div class="error-msg"><i class="fas fa-exclamation-circle"></i> <span>Password is required</span></div>
      </div>

      <button type="submit" class="auth-btn auth-btn-primary">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <button class="auth-btn auth-btn-google" onclick="googleSignIn()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Sign in with Google
    </button>

    <div class="auth-links">
      Don't have an account? <a href="register.html">Sign Up</a>
    </div>
  </div>
</div>

<div class="auth-footer">
  <p>&copy; 2026 InternMatch | DBMS Project</p>
</div>

<script src="../scripts/auth.js"></script>
</body>
</html>
